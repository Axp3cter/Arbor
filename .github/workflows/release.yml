name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rokit
        uses: CompeyDev/setup-rokit@v0.1.2

      - name: Check formatting
        run: stylua --check src/ test/ bench/

      - name: Build Arbor.rbxm
        run: rojo build default.project.json -o Arbor.rbxm

      - name: Build Arbor-dev.rbxl
        run: rojo build dev.project.json -o Arbor-dev.rbxl

      - name: Build Arbor-bench.rbxl
        run: rojo build bench.project.json -o Arbor-bench.rbxl

      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          name: Arbor ${{ github.ref_name }}
          files: |
            Arbor.rbxm
            Arbor-dev.rbxl
            Arbor-bench.rbxl
          generate_release_notes: false
