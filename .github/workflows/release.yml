name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rokit
        uses: CompeyDev/setup-rokit@v0.1.2

      - name: Check formatting
        run: stylua --check src/ test/ bench/

      - name: Build bt.rbxm
        run: rojo build default.project.json -o bt.rbxm

      - name: Build bt-dev.rbxl
        run: rojo build dev.project.json -o bt-dev.rbxl

      - name: Build bt-bench.rbxl
        run: rojo build bench.project.json -o bt-bench.rbxl

      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          name: bt ${{ github.ref_name }}
          files: |
            bt.rbxm
            bt-dev.rbxl
            bt-bench.rbxl
          generate_release_notes: false
